<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Nazario Ulis Cup</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>

.team-detailed-card { border: 1px solid #444; padding: 15px; margin-bottom: 12px; border-radius: 8px; background: #383838; color: white; }
.team-header { font-size: 1.2em; margin-bottom: 10px; display:flex; align-items:center; gap: 8px; border-bottom: 1px solid #555; padding-bottom: 8px; }
.team-info { font-size: 0.95em; color: #ccc; margin-bottom: 12px; }

/* Nettoyage et structure de la grille */
.schedule-grid {
    display: grid;
    /* 150px pour le nom, et 3 colonnes égales pour les durées */
    grid-template-columns: 150px 1fr 1fr 1fr; 
    gap: 20px;
    align-items: center; /* Aligne verticalement le texte et les champs */
    background: rgba(255, 255, 255, 0.03);
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 10px;
}

/* Style des labels pour qu'ils soient propres */
.schedule-grid label {
    display: flex;
    flex-direction: column; /* Label au-dessus de l'input */
    font-size: 0.8rem;
    color: #a0a0a0;
    text-transform: uppercase;
}

/* Style des champs input dans cette section */
.schedule-grid input {
    margin-top: 5px;
    background: #0b0e14;
    border: 1px solid #333;
    padding: 8px;
    color: white;
    border-radius: 4px;
}

body {
    font-family: 'Roboto Condensed', sans-serif;
}

.table tr {
    height: 50px !important; /* Force une hauteur confortable */
    min-height: 50px !important;
}


/* 3. Débloque le conteneur du tableau */
.table-container {
    overflow-x: auto; /* Permet le scroll horizontal si besoin, mais pas vertical */
    height: auto !important;
}

.card input, 
.card select {
    background-color: #1a1f28 !important;
    color: #ffffff !important;
    border: 1px solid #444 !important;
    padding: 8px !important;
    border-radius: 6px !important;
}

/* Force la couleur du texte à l'intérieur des listes quand on clique dessus */
.card select option {
    background-color: #1a1f28;
    color: #ffffff;
}

/* Style du nouveau compteur */
.timer-wrapper { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 8px; 
    margin-top: 15px; 
}
.timer-digits { 
    display: flex; 
    gap: 15px; 
    font-family: 'Impact', sans-serif; 
    font-size: 60px; 
    color: var(--cat-color); 
    line-height: 1;
}
.timer-labels { 
    display: flex; 
    gap: 35px; /* Espace entre MINUTES et SECONDES */
    font-family: 'Arial Narrow', sans-serif; 
    font-size: 12px; 
    font-weight: 700; 
    color: #fff; 
    text-transform: uppercase; 
    letter-spacing: 0.1em;
}
:root {
    --bg-dark: #0b0e14;
    --card-bg: rgba(22, 28, 36, 0.85);
    --border-color: rgba(255, 255, 255, 0.1);
    --text-main: #ffffff;
    --text-muted: #a0a0a0;
	--gold: #f8c65c; /* <--- AJOUTE CETTE LIGNE ICI */
    /* Couleurs des catégories */
    --u13-color: #3498db; /* Bleu */
    --u15-color: #27ae60; /* Vert */
    --u18-color: #e74c3c; /* Rouge */
}

body {
    background-color: var(--bg-dark);
    background-image: linear-gradient(135deg, #0b0e14 0%, #1a1f28 100%);
    color: var(--text-main);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 20px;
}

/* Titres stylisés */
h2 {
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 1.2rem;
    color: var(--text-main);
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 10px;
    margin-top: 0;
}

.table-container {
    width: 100%;
	min-height: 100px;
    background: transparent !important; /* Juste pour voir la zone du tableau */
    border: 1px solid rgba(255, 255, 255, 0.1);
    margin-top: 10px;
	height: auto !important;
    max-height: none !important;
    overflow-y: visible !important;
}

.card, .table-container {
    height: auto !important;     /* Supprime toute hauteur fixe */
    max-height: none !important; /* Supprime toute limite de hauteur */
    overflow-y: visible !important; /* Affiche tout le contenu */
}


/* Style pro pour les en-têtes de tableau */
thead tr {
    background: rgba(255, 255, 255, 0.08); /* Fond très légèrement grisé */
    border-bottom: 2px solid #3498db;      /* Une ligne d'accent sous les titres */
}

th {
    color: #ffffff !important;             /* Titres en blanc pur */
    font-size: 0.65rem !important;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 4px !important;           /* Un peu plus d'air pour respirer */
}

/* Style pour les données (plus lisibles) */
td {
    color: #e0e0e0;
    font-weight: 500;
}

th, td {
    padding: 6px 3px; /* Espacement minimal pour gagner de la place */
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}



button, input, select, textarea { font: inherit; }

button {
  border: 0;
  border-radius: 12px;
  padding: 10px 14px;
  background: #17375f;
  color: white;
  cursor: pointer;
  font-weight: 700;
}
button:hover { filter: brightness(1.15); }
button.good { background: #137c49; }
button.warn { background: #8f5b00; }
button.bad { background: #8d2634; }

/* Style global pour tous les menus déroulants */
select {
    background-color: #1a1f28 !important; /* Couleur de fond sombre */
    color: #ffffff !important;           /* Texte blanc */
    border: 1px solid #444;
    padding: 8px;
    border-radius: 6px;
    appearance: none;                    /* Retire le style par défaut du système */
    -webkit-appearance: none;
    -moz-appearance: none;
}

/* Style pour s'assurer que le texte est lisible au survol */
select:focus, select:hover {
    border-color: #3498db;               /* Une bordure colorée au survol fait pro */
    outline: none;
}


select option {
    background-color: #1a1f28 !important;
    color: #ffffff !important;
}

.app {
  min-height: 100vh;
  padding: 18px;
  background: radial-gradient(circle at 50% -10%, #17304a 0,#0a1625 42%,#0a0f1d 100%);
}

.top {
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.brand h1 {
  margin: 0;
  color: var(--gold);
  letter-spacing: .08em;
  text-transform: uppercase;
  font-stretch: condensed;
}

.tabs { display: flex; gap: 8px; flex-wrap: wrap; }
.tab { background: rgba(255, 255, 255, 0.08); }
.tab.active { background: var(--gold); color: #111; }

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; align-items: start;}
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.card {
    background: rgba(3, 11, 22, 0.92) !important; /* Le noir profond */
    border: 1px solid rgba(255,255,255,0.05); /* Bordure blanche quasi invisible */
    border-radius: 12px;
    padding: 20px;
	min-height: auto;
    overflow-y: visible;
	height: auto; /* Laisse les cartes s'adapter au contenu */
    box-shadow: 0 4px 15px rgba(0,0,0,0.5); /* Ombre portée douce */
}
.card h2, .card h3 { margin: 0 0 12px; color: #fff; }
.muted { color: var(--muted); }

.row { display: flex; gap: 10px; align-items: center; }
.row > * { flex: 1; }

.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, .08);
  border-radius: 999px;
  padding: 6px 10px;
}

.teamline { display: flex; align-items: center; gap: 8px; font-weight: 800; }
.flag { font-size: 1.35em; }

.table {
    width: 100%;
	text-align: center;
	min-height: 100px;
    table-layout: fixed;
    border-collapse: collapse;
	font-size: 2rem; /* Augmente la taille du texte */
    border-collapse: collapse;
    border-spacing: 0 5px; /* Ajoute un petit espace entre les lignes */
}

/* Force les en-têtes à respecter la même largeur que les colonnes */
.table thead th {
    padding: 1px;
    font-size: 0.8rem;
    color: #aaa;
    text-align: center; /* Centre les titres des colonnes */
    overflow: hidden;
    white-space: nowrap;
}

.table th, .table td {
    font-size: 1rem !important; 
    padding: 0px !important;
	line-height: 1.4 !important;
    text-align: center;
	height: auto !important;
	    vertical-align: middle !important;
	white-space: nowrap; /* Empêche le texte de se mettre sur plusieurs lignes */
}
/* On s'assure que le drapeau ne force pas la hauteur de la ligne */
.table td img {
    height: 16px !important;      /* Taille réduite pour le drapeau */
    width: auto;
    vertical-align: middle;
}

.table thead th:nth-child(3),
.table tbody td:nth-child(3) {
    text-align: left; /* Aligne le nom de l'équipe à gauche */
    padding-left: 10px;
}
.table th { color: var(--gold); font-size: .84rem; }

.num {
    text-align: center;
}
.table .center { text-align: center; }

.match {
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 12px;
  margin: 8px 0;
  background: rgba(255, 255, 255, .06);
}
.score { font-size: 26px; font-weight: 900; text-align: center; color: var(--gold); }
.hidden { display: none !important; }

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.72);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 5;
}
.modalbox {
  width: min(900px, 96vw);
  max-height: 90vh;
  overflow: auto;
  background: #08182b;
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 18px;
}
.small { font-size: .9rem; }
.actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

.flag-img {
  width: 52px;
  height: 35px;
  object-fit: cover;
  border-radius: 4px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.15);
  vertical-align: middle;
  flex: 0 0 auto;
}

.status-dot { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
.status-dot:before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: #8997a8; }
.status-dot.live {
    color: var(--u15-color);
    text-shadow: 0 0 8px var(--u15-color);
}
.status-dot.done:before { background: var(--gold); }
.status-dot.paused:before { background: var(--red); }

.compact-card { padding: 12px; }

/* ==========================================================================
   📺 CONFIGURATION MAQUETTE OFFICIELLE — MODE TV COMPLET
   ========================================================================== */
.tv-v9 {
    min-height: 100% !important; /* Permet au conteneur de grandir */
    width: 100%;
    overflow-x: hidden; 
    overflow-y: auto !important; /* Force le scroll vertical si le contenu est trop grand */
    background: linear-gradient(rgba(2, 10, 24, 0.55), rgba(2, 10, 24, 0.75)), 
                url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1920&auto=format&fit=crop') center/cover fixed;
    color: #fff;
    display: flex;
    flex-direction: column;
}

.broadcast-header {
  height: 125px;
  display: grid;
  grid-template-columns: 460px 1fr 400px;
  align-items: center;
  background: linear-gradient(180deg, #040e1a 0%, #010610 100%);
  border-bottom: 3px solid rgba(255,255,255,0.1);
  box-shadow: 0 15px 35px rgba(0,0,0,0.8);
  padding: 0 24px;
}

.broadcast-brand {
  display: flex;
  align-items: center;
  gap: 14px;
}
.broadcast-brand img {
  height: 94px;
  width: auto;
  object-fit: contain;
}
/* --- TITRE DU TOURNOI --- */
.broadcast-title {
    color: var(--gold) !important; /* Ajoute cette ligne pour NAZARIO */
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: 42px;
    letter-spacing: 0.02em;
    line-height: 0.95;
    text-transform: uppercase;
}

.broadcast-title span { 
    color: var(--gold) !important; /* Force la couleur sur le texte "ULIS CUP" */
}
.edition {
  font-family: 'Impact', 'Arial Narrow', sans-serif;
  letter-spacing: 0.28em;
  color: #fff;
  font-size: 16px;
  margin-top: 4px;
  opacity: 0.8;
}

.broadcast-time {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-top: 0; border-bottom: 0;
  height: 100%;
}
.broadcast-time strong {
  font-family: 'Impact', sans-serif;
  font-size: 48px;
  letter-spacing: 0.04em;
  line-height: 1;
}
.broadcast-time span {
  font-family: 'Arial Narrow', sans-serif;
  font-size: 13px;
  font-weight: 800;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 6px;
  letter-spacing: 0.05em;
}

.broadcast-welcome {
  text-align: right;
  padding-right: 12px;
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
}
.broadcast-welcome strong {
  font-size: 21px;
  letter-spacing: 0.05em;
  color: #ffffff;
  display: block;
}
.broadcast-welcome span {
  color: var(--gold);
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 0.08em;
  margin-top: 2px;
  display: block;
}

.tv-toolbar {
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: #020813;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.screen-chip {
  color: var(--gold);
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-size: 14px;
  font-family: 'Oswald', sans-serif;
}
.tv-actions { display: flex; align-items: center; gap: 8px; }
.tv-actions select { width: 90px; padding: 6px; background: #020914; }
.tv-actions button { padding: 6px 14px; }

.tv-screen {
    background: #050a12;
    padding: 20px;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.tv-screen-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px;
  letter-spacing: 0.04em;
  text-align: center;
  margin: 4px 0 10px;
  text-transform: uppercase;
  margin-bottom: 0 !important;
  padding-bottom: 0 !important;
}

CSS
/* Sécurité pour le Mode TV */
.tv-screen .card {
    background: rgba(3, 11, 22, 0.92) !important; /* Force le noir profond */
    border: 1px solid rgba(255, 255, 255, 0.1) !important;
    padding: 20px !important;
    border-radius: 16px !important;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
}

.tv-screen .table-container {
    max-height: 400px; /* Optionnel : limite la hauteur pour ne pas avoir une carte géante */
    overflow-y: auto;  /* Permet de scroller si la liste est trop longue */
}

/* Ajustement spécial TV */
.tv-screen .card h2 {
    text-align: center;
    width: 100%;
    margin-bottom: 15px;
}

/* Style homogène des titres */
.card h2 {
    font-family: 'Roboto Condensed', sans-serif;
    text-align: center;
    text-transform: uppercase;
    font-size: 1.8rem;
    margin-top: 0;
    margin-bottom: 15px;
}

/* Applique la police à tout l'écran TV */
.tv-screen, 
.tv-screen * {
    font-family: 'Roboto Condensed', 'Arial', sans-serif !important;
}

/* Force la taille et le style des titres pour qu'ils soient identiques partout */
.tv-screen h2 {
    font-family: 'Roboto Condensed', 'Arial', sans-serif !important;
    font-size: 1.8rem !important;
    text-transform: uppercase;
}

/* Couleurs et bordures par catégorie */
/* Remplace "Petits", "Moyens", "Grands" par les noms exacts de tes catégories si besoin */
.card[data-category="Petits"] { border-top: 5px solid #3498db; }
.card[data-category="Petits"] h2 { color: #3498db; }

.card[data-category="Moyens"] { border-top: 5px solid #f39c12; }
.card[data-category="Moyens"] h2 { color: #f39c12; }

.card[data-category="Grands"] { border-top: 5px solid #e74c3c; }
.card[data-category="Grands"] h2 { color: #e74c3c; }

.tv-screen .card h3 {
    color: #666;
    margin-top: 15px;
}

.tv-screen table {
    font-size: 1.2rem; /* Plus lisible à distance */
}

/* --- ÉCRAN 1 : REPRODUCTION EXIGEANTE DE LA STRUCTURE DE LA MAQUETTE --- */
.live-screen-v10 .live-columns-v9 {
  display: grid !important;
  grid-template-columns: repeat(3, 1fr) !important;
  gap: 20px !important;
  flex: 1;
}

.pitch-v9 {
  border-radius: 16px;
  background: rgba(3, 11, 22, 0.92);
  border: 2px solid var(--cat-color);
  padding: 16px 14px !important;
  display: flex !important;
  flex-direction: column !important;
  justify-content: flex-start !important;
  gap: 16px !important;
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}
.pitch-v9.blue { --cat-color: var(--u13-color); }
.pitch-v9.green { --cat-color: var(--u15-color); }
.pitch-v9.red { --cat-color: var(--u18-color); }

/* Unification de l'en-tête et de sa ligne */
.pitch-head {
    text-align: center;
    padding-bottom: 10px;
    margin-bottom: 20px;
    border-bottom: 3px solid var(--cat-color); /* LA LIGNE UNIQUE */
    width: 100%;
}

.pitch-head span {
    display: block !important;
    font-family: 'Oswald', 'Impact', sans-serif !important;
    font-weight: 700 !important;
    font-size: 2.8rem !important;
    letter-spacing: 3px !important;
    text-transform: uppercase !important;
    line-height: 1 !important;
    color: var(--cat-color) !important;
}

/* On supprime les conflits spécifiques */
.board-v9 .pitch-head span {
    /* Vide de tout font-size spécifique, il héritera de la règle générale */
    color: var(--cat-color) !important;
    font-family: 'Oswald', 'Impact', sans-serif !important;
}


.duel-v9 {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 8px;
}
.side-v9 {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.side-v9 .flag-img {
  width: 105px !important;
  height: 70px !important;
  border-radius: 6px;
}
.side-v9 strong {
  font-family: 'Arial Narrow', sans-serif;
  font-weight: 800;
  font-size: 21px !important;
  text-transform: uppercase;
  color: #fff;
  text-align: center;
}

/* Centrage parfait du score et du tiret */
.score-v9 {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    white-space: nowrap !important;
    font-size: 4rem !important; /* Ajuste la valeur (4rem, 5rem...) selon ton besoin */
    font-weight: bold;
}

.score-v9 em {
    font-style: normal !important;
    margin: 0 10px !important; /* Espace entre les chiffres et le tiret */
    vertical-align: middle !important;
}

.countdown-panel {
  width: 100%;
  text-align: center;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 8px !important;
}
.countdown-panel span {
  font-family: 'Arial Narrow', sans-serif;
  font-weight: 800;
  font-size: 13px !important;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.count-v9 {
  font-family: 'Impact', sans-serif;
  font-size: 58px !important;
  color: var(--u15-color) !important;
  line-height: 1;
  margin-top: 2px;
}
.pitch-v9.blue .count-v9 { color: #18a8ff !important; }
.pitch-v9.green .count-v9 { color: #5bd62f !important; }
.pitch-v9.red .count-v9 { color: #ff3b3b !important; }
.count-v9.ended { color: var(--red) !important; }

/* Blocs Inférieurs Intégrés (Classement & Calendrier Prochains Matchs) */
.pitch-bottom-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  margin-top: auto;
}
.pitch-mini-panel {
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 10px;
  padding: 10px 8px;
}
.pitch-mini-panel h4 {
  margin: 0 0 8px;
  text-align: center;
  font-family: 'Arial Narrow', sans-serif;
  font-size: 13px;
  font-weight: 800;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding-bottom: 4px;
}
.pitch-mini-panel .table {
  font-size: 20px;
}
.pitch-mini-panel .pitch-mini-panel .table th {
  padding: 4px 2px;
}
.pitch-mini-panel .table th {
  font-size: 11px;
}
.pitch-mini-panel .flag-img {
  width: 22px !important;
  height: 15px !important;
  border-radius: 2px;
  box-shadow: none;
}

.mini-match-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.mini-match-row {
  display: grid;
  grid-template-columns: 36px 1fr 20px 1fr;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  font-weight: 700;
}

/* Donne toute la place restante à l'équipe */
.team-name {
    padding-left: 10px !important;
    overflow: hidden;

window.applySchedule = function(matches) {
    const state = window.state;
    const sched = state.schedule || { start: "10:00", slot: 20, pauseStart: "12:30", pauseMinutes: 90 };
    
    const startVal = window.timeToMin(sched.start) || 600;
    const slot = Number(sched.slot || 20);
    const pauseStart = window.timeToMin(sched.pauseStart) || 750;
    const pauseEnd = pauseStart + Number(sched.pauseMinutes || 0);

    // 1. Initialisation avec l'ID de la catégorie (100% fiable)
    let t1 = {};
    let t2_morn = {};
    let t2_aft = {};
    
    state.cats.forEach(c => {
        t1[c.id] = startVal;     // On utilise l'ID directement !
        t2_morn[c.id] = 600;     // 10h00
        t2_aft[c.id] = pauseEnd;
    });

    // 2. Trie interne (sans dépendre de fonctions externes)
    const getCatIdx = (cid) => state.cats.findIndex(c => c.id === cid);
    
    let j1 = matches.filter(m => m.day === 1).sort((a,b) => getCatIdx(a.cat) - getCatIdx(b.cat) || a.order - b.order);
    let j2_group = matches.filter(m => m.day === 2 && m.phase === 'GROUP').sort((a,b) => getCatIdx(a.cat) - getCatIdx(b.cat) || a.order - b.order);
    let j2_finals = matches.filter(m => m.day === 2 && m.phase !== 'GROUP').sort((a,b) => getCatIdx(a.cat) - getCatIdx(b.cat) || a.order - b.order);

    // 3. Application des horaires (sans utiliser window.cat)
    j1.forEach(m => {
        let current = t1[m.cat]; // m.cat est l'ID, ça correspondra toujours !
        if (current === undefined) return; 
        
        if (current >= pauseStart && current < pauseEnd) current = pauseEnd;
        m.plannedTime = window.minToTime(current);
        t1[m.cat] = current + slot;
    });

    j2_group.forEach(m => {
        let current = t2_morn[m.cat];
        if (current === undefined) return;
        
        m.plannedTime = window.minToTime(current);
        t2_morn[m.cat] = current + slot;
    });

    j2_finals.forEach(m => {
        let current = t2_aft[m.cat];
        if (current === undefined) return;
        
        m.plannedTime = window.minToTime(current);
        
        // Espacement spécial pour les "Grands"
        let catObj = state.cats.find(c => c.id === m.cat);
        let spacing = (catObj && catObj.name === 'Grands') ? (slot * 2) : slot;
        t2_aft[m.cat] = current + spacing;
    });
    
    console.log("DEBUG: Planning recalculé (Version 100% autonome).");
};

function roundRobin(arr){let a=[...arr];if(a.length%2)a.push(null);let rounds=[];for(let r=0;r<a.length-1;r++){let games=[];for(let i=0;i<a.length/2;i++){let x=a[i],y=a[a.length-1-i];if(x&&y)games.push(r%2?[y,x]:[x,y])}rounds.push(games);a.splice(1,0,a.pop())}return rounds}

function genMatches() {
    console.log("DEBUG: Lancement de genMatches...");

        s.cats.forEach((cat, catIndex) => {

            const teamsInCat = window.catTeams(cat.id);
            console.log(`DEBUG: Catégorie ${cat.name} (${cat.id}) - Équipes trouvées :`, teamsInCat.length);
            
            let pools = { 
                A: teamsInCat.filter(t => t.pool === 'A'), 
                B: teamsInCat.filter(t => t.pool === 'B') 
            };
            
            // ATTENTION : Si roundRobin n'est pas défini, ça plante ici !
            if (typeof window.roundRobin !== 'function') {
                console.error("ERREUR CRITIQUE : La fonction roundRobin() n'est pas définie !");
                return;
            }

            let rounds = { A: window.roundRobin(pools.A), B: window.roundRobin(pools.B) };
            
            let interleavedPairs = [];
            let max = Math.max(rounds.A.length, rounds.B.length);
            
            for (let r = 0; r < max; r++) {
                let ga = rounds.A[r] || [];
                let gb = rounds.B[r] || [];
                let n = Math.max(ga.length, gb.length);
                
                for (let i = 0; i < n; i++) {
                    if (ga[i]) interleavedPairs.push({ pair: ga[i], pool: 'A' });
                    if (gb[i]) interleavedPairs.push({ pair: gb[i], pool: 'B' });
                }
            }

            // Génération (Aller/Retour)
            let allMatches = [];
            ['OUTBOUND', 'RETURN'].forEach(leg => {
                interleavedPairs.forEach(item => {
                    allMatches.push({ leg, item });
                });
            });

            allMatches.forEach((m, index) => {
                let pair = m.leg === 'RETURN' ? [m.item.pair[1], m.item.pair[0]] : m.item.pair;
                let pool = m.item.pool; 
                
                let isCat3 = (catIndex === 2);

                s.matches.push({
                    id: window.uid(), 
                    cat: cat.id, 
                    pool: pool, 
                    phase: 'GROUP', 
                    leg: m.leg,
                    a: pair[0].id, 
                    b: pair[1].id, 
                    sa: 0, 
                    sb: 0, 
                    status: 'todo',
                    day: day, 
                    order: index + 1
                });
            });
        });
        
        console.log(`DEBUG: Total matchs générés : ${s.matches.length}`);
        
        // Appel final
        if (typeof window.applySchedule === 'function') {
            window.applySchedule(s.matches);
        } else {
            console.error("ERREUR : La fonction applySchedule() n'est pas définie.");
        }
    });
    
    alert("Génération des matchs terminée");
}
function standings(cid,pool){let rows=catTeams(cid).filter(t=>!pool||t.pool===pool).map(t=>({team:t,j:0,g:0,n:0,p:0,bp:0,bc:0,diff:0,pts:0}));let map=Object.fromEntries(rows.map(r=>[r.team.id,r]));state.matches.filter(m=>m.cat===cid&&m.phase==='GROUP'&&m.status==='done'&&(!pool||m.pool===pool)).forEach(m=>{let a=map[m.a],b=map[m.b];if(!a||!b)return;a.j++;b.j++;a.bp+=m.sa;a.bc+=m.sb;b.bp+=m.sb;b.bc+=m.sa;if(m.sa>m.sb){a.g++;b.p++;a.pts+=3}else if(m.sa<m.sb){b.g++;a.p++;b.pts+=3}else{a.n++;b.n++;a.pts+=1;b.pts++}});rows.forEach(r=>r.diff=r.bp-r.bc);return rows.sort((a,b)=>b.pts-a.pts||b.diff-a.diff||b.bp-a.bp)}

function sortedMatches() {
const state = window.state;
    return [...state.matches].sort((a, b) => {
        // 1. D'abord on trie par JOUR (1 puis 2)
        let dayA = a.day || 1;
        let dayB = b.day || 1;
        if (dayA !== dayB) return dayA - dayB;

        // 2. Ensuite on trie par HEURE
        let ta = timeToMin(a.plannedTime || '23:59');
        let tb = timeToMin(b.plannedTime || '23:59');
        if (ta !== tb) return ta - tb;

        // 3. Ensuite par CATÉGORIE
        let catA = categoryIndex(a.cat);
        let catB = categoryIndex(b.cat);
        if (catA !== catB) return catA - catB;

        // 4. Enfin par ORDRE
        return (a.order || 0) - (b.order || 0);
    });
}

function confirmScorers() {
    if (!window.modal) {
        console.error("Aucune modale active.");
        return;
    }

    const state = window.state;
    let m = state.matches.find(x => x.id === window.modal.match);
    if (!m) return;

    // 1. Calcul des scores actuels
    let sa = parseInt(m.sa) || 0;
    let sb = parseInt(m.sb) || 0;

    // 2. Nettoyage des tableaux (on retire les champs vides/nulls)
    let scorersA = (window.modal.a || []).filter(p => p && p.trim() !== "");
    let scorersB = (window.modal.b || []).filter(p => p && p.trim() !== "");

    // 3. VÉRIFICATION : Le nombre de buteurs doit correspondre au score
    if (scorersA.length !== sa) {
        alert(`Attention : Tu as saisi ${sa} but(s) pour l'équipe A, mais tu as sélectionné ${scorersA.length} buteur(s). Veuillez corriger.`);
        return;
    }
    if (scorersB.length !== sb) {
        alert(`Attention : Tu as saisi ${sb} but(s) pour l'équipe B, mais tu as sélectionné ${scorersB.length} buteur(s). Veuillez corriger.`);
        return;
    }

    // 4. Si tout est OK, on enregistre
    setState(s => {
        let match = s.matches.find(x => x.id === window.modal.match);
        if (!match) return;

        if (!s.goals) s.goals = [];

        match.status = 'done';
        match.endedAt = Date.now();
        match.winner = window.modal.winner || (sa > sb ? match.a : (sb > sa ? match.b : null));
        
        // Nettoyage anciens buts et ajout des nouveaux validés
        s.goals = s.goals.filter(g => g.match !== match.id);
        scorersA.forEach(p => s.goals.push({match: match.id, cat: match.cat, team: match.a, player: p}));
        scorersB.forEach(p => s.goals.push({match: match.id, cat: match.cat, team: match.b, player: p}));

        if (typeof updateNextMatch === 'function') updateNextMatch(s, match);
        window.modal = null;
    });
    
    window.save(); 
    render();
}

                s.matches.push({id: uid(), cat: c.id, pool: 'Finale', phase: 'F', order: 7, a: 'TBD_SF1', b: 'TBD_SF2', sa: 0, sb: 0, status: 'todo', day: 2});
            }
            // CAS 2 : Poule unique (5 équipes)
            else if (all.length === 5) {
                // Barrage 4 vs 5
                s.matches.push({id: uid(), cat: c.id, pool: 'Finale', phase: 'BARRAGE', order: 1, a: all[3].team.id, b: all[4].team.id, sa: 0, sb: 0, status: 'todo', day: 2});
                // SF1 : 1er vs Vainqueur Barrage
                s.matches.push({id: uid(), cat: c.id, pool: 'Finale', phase: 'SF', order: 2, a: all[0].team.id, b: 'TBD_BARRAGE', sa: 0, sb: 0, status: 'todo', day: 2});
                // SF2 : 2ème vs 3ème

                // Finale
                s.matches.push({id: uid(), cat: c.id, pool: 'Finale', phase: 'F', order: 4, a: 'TBD_SF1', b: 'TBD_SF2', sa: 0, sb: 0, status: 'todo', day: 2});
            }
        });
        applySchedule(s.matches);
    });
}
function getMatchParticipantLabel(id) {
    if (typeof id === 'string' && id.includes('TBD_')) {
        let parts = id.split('_'); // ['TBD', 'BARRAGE'] ou ['TBD', 'QF1']
        let type = parts[1].replace('QF', 'QUART ').replace('SF', 'DEMI ').replace('BARRAGE', 'BARRAGE');
        return `VAINQUEUR ${type}`;
    }
    return team(id).country;
}

function generateNextFinalRound(cid) {
    const state = window.state;
    let phases = ['BARRAGE', 'QF', 'SF', 'F'];
    
    // --- CORRECTION : On cherche la phase qui contient au moins UN match PAS ENCORE TERMINÉ ---
    let current = phases.find(p => 
        state.matches.some(m => m.cat === cid && m.phase === p && m.status !== 'done')
    );

    if (!current) { 
        alert("Toutes les phases sont déjà terminées !"); 
        return; 
    }
    
    // Si on est déjà en finale, on ne peut pas générer de tour suivant
    if (current === 'F') { alert('La finale est déjà terminée.'); return; }

    // 2. Récupérer tous les vainqueurs des matchs terminés de la phase actuelle
    let winners = state.matches
        .filter(m => m.cat === cid && m.phase === current && m.status === 'done')
        .map(m => m.winner || (m.sa > m.sb ? m.a : m.b))
        .filter(Boolean);

    if (winners.length === 0) {
        alert("Aucun nouveau vainqueur trouvé dans cette phase.");
        return;
    }

    // 3. Remplissage
    setState(s => {
        let nextMap = { 'BARRAGE': 'SF', 'QF': 'SF', 'SF': 'F' };
        let next = nextMap[current];
        let nextMatches = s.matches.filter(m => m.cat === cid && m.phase === next);

        let winnerIdx = 0;
        nextMatches.forEach(m => {
            const isPlaceholder = (id) => typeof id === 'string' && (id.includes('TBD') || id.includes('VAINQUEUR'));

            if (winnerIdx < winners.length && isPlaceholder(m.a)) {
                m.a = winners[winnerIdx++];
            }
            if (winnerIdx < winners.length && isPlaceholder(m.b)) {
                m.b = winners[winnerIdx++];
            }
        });
        applySchedule(s.matches);
    });
    
    alert(`Placement effectué pour ${winners.length} équipe(s).`);
}
window.generateNextFinalRound = generateNextFinalRound;
window.generateNextFinalRound = generateNextFinalRound;
function updateNextMatch(state, currentMatch) {
    if (currentMatch.phase === 'GROUP') return;
    
    const nextMap = { 'BARRAGE': 'SF', 'QF': 'SF', 'SF': 'F' };
    const nextPhase = nextMap[currentMatch.phase];
    if (!nextPhase) return;

    const winner = currentMatch.winner || (parseInt(currentMatch.sa) > parseInt(currentMatch.sb) ? currentMatch.a : currentMatch.b);

    let nextMatch;
    if (nextPhase === 'F') {
        nextMatch = state.matches.find(m => m.cat === currentMatch.cat && m.phase === 'F');
    } else {
        nextMatch = state.matches.find(m => m.cat === currentMatch.cat && m.phase === nextPhase && m.order === currentMatch.order);
    }

    // Fonction sécurisée pour vérifier si le slot est libre
    const isSlotFree = (val) => !val || (typeof val === 'string' && (val.includes('TBD') || val.includes('VAINQUEUR')));

    if (nextMatch) {
        if (isSlotFree(nextMatch.a)) {
            nextMatch.a = winner;
        } else if (isSlotFree(nextMatch.b)) {
            nextMatch.b = winner;
        }
    }
}

        case 'F': return 'Finale';
        default: return p;
    }
}

function matchTV(m, i = 0) {
    let a = team(m.a), b = team(m.b);
    let category = cat(m.cat);
    let sa = parseInt(m.sa) || 0;
    let sb = parseInt(m.sb) || 0;
    
    // Détermination du label de phase
    const phaseLabel = m.phase === 'GROUP' ? `Poule ${m.pool}` :
                       m.phase === 'BARRAGE' ? 'Barrage' :
                       m.phase === 'QF' ? 'Quart de finale' :
                       m.phase === 'SF' ? 'Demi-finale' :
                       'Finale';

    let catIndex = state.cats.findIndex(c => c.id === category.id);
    const colors = ['var(--u13-color)', 'var(--u15-color)', 'var(--u18-color)'];
    let catColor = colors[catIndex] || '#555';

    // Préparation des standings seulement si c'est une phase de groupe
    let standingsHTML = '';
    if (m.phase === 'GROUP') {
        let ptsA = sa > sb ? 3 : (sa === sb ? 1 : 0);
        let ptsB = sb > sa ? 3 : (sa === sb ? 1 : 0);
        
        let poolData = standings(m.cat, m.pool).map(t => {
            let pts = parseInt(t.pts) || 0;
            if (t.team.id === m.a) pts += ptsA;
            if (t.team.id === m.b) pts += ptsB;
            return { ...t, pts: pts };
        }).sort((x, y) => y.pts - x.pts);

        standingsHTML = `
        <div class="mini-standings">
            <table class="live-standings-table" style="font-size: 30px !important;">
                ${poolData.map(t => {
                    let teamObj = t.team; 
                    return `<tr class="${teamObj.id === m.a || teamObj.id === m.b ? 'highlight' : ''}">
                        <td style="font-size: 30px !important; padding: 10px;">${teamObj.country}</td>
                        <td class="pts" style="font-size: 30px !important; padding: 10px;">${t.pts} pts</td>
                    </tr>`;
                }).join('')}
            </table>
        </div>`;
    }

    return `<section class="pitch-v9" style="--cat-color: ${catColor}">
        <div class="pitch-head">
            <span>TERRAIN ${i+1} - ${category.name}</span>
            <div style="font-size: 16px; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; color: rgba(255,255,255,0.8);">${phaseLabel}</div>
        </div>
        <div class="duel-v9">
            <div class="side-v9">${flagHTML(a)}<strong>${a.country}</strong></div>
            <div class="score-v9">${m.sa}<em>–</em>${m.sb}</div>
            <div class="side-v9">${flagHTML(b)}<strong>${b.country}</strong></div>
        </div>
        <div class="timer-wrapper">
            <div class="timer-digits" style="color: ${catColor}">
                <span class="count-v9" data-match-id="${m.id}">${elapsed(m)}</span>
            </div>
        </div>
        ${standingsHTML}
    </section>`;
}

function getLiveStandings(catId, poolId) {
    let baseStandings = standings(catId, poolId);
    let data = (!baseStandings || baseStandings.length === 0) 
        ? catTeams(catId).filter(t => t.pool === poolId).map(t => ({team: t, j: 0, g: 0, n: 0, p: 0, bp: 0, bc: 0, diff: 0, pts: 0}))

function importTeamsFromCsv(lines) {
    console.log("DÉBUT IMPORT. Lignes trouvées :", lines.length);
    
    setState(s => {
        // Sécurité : Si s.cats est absent, on l'initialise pour éviter le crash
        if (!s.cats) {
            console.error("ERREUR : s.cats est indéfini. Réinitialisation des catégories.");
            s.cats = []; 
        }

        // On vide uniquement les équipes, pas tout le state
        s.teams = []; 

        lines.forEach((line, index) => {
            if (!line.trim()) return;
            
            const parts = line.split(';');
            if (parts.length < 3) {
                console.warn(`Ligne ${index + 1} ignorée : format incorrect.`);
                return;
            }

            const [countryName, catName, pool, coach] = parts.map(item => item.trim());
            
            // Cherche la catégorie en toute sécurité
            const category = s.cats.find(c => c.name && c.name.toLowerCase() === catName.toLowerCase());
            
            if (!category) {
                console.error(`Erreur Ligne ${index + 1} : La catégorie "${catName}" n'existe pas.`);
                return;
            }

            const countryInfo = WC.find(x => x.name.toLowerCase() === countryName.toLowerCase());
            const code = countryInfo ? countryInfo.code : 'XXX';
            const flag = countryInfo ? countryInfo.flag : '🏳️';

            s.teams.push({
                id: uid(),
                cat: category.id,
                pool: pool.toUpperCase(),
                country: countryName,
                coach: coach || 'Non renseigné',
                code: code,
                flag: flag,
                players: Array.from({length: 10}, (_, j) => ({id: uid(), name: `Joueur ${j+1} ${code}`}))
            });
        });
    });
    alert("Import des équipes terminé");
}
window.importTeamsFromCsv = importTeamsFromCsv;
function importPlayersFromCsv(lines) {
    setState(s => {
        const playerMap = {}; // Sert à regrouper les joueurs par pays

        // 1. On parcourt toutes les lignes pour grouper les joueurs par pays
        lines.forEach(line => {
            const [country, playerName] = line.split(';').map(i => i.trim());
            if (!country || !playerName) return;
            
            if (!playerMap[country]) playerMap[country] = [];
            playerMap[country].push(playerName);
        });

        // 2. On met à jour chaque équipe trouvée
        for (const countryName in playerMap) {
            const team = s.teams.find(t => t.country.toLowerCase() === countryName.toLowerCase());
            
            if (team) {
                // On remplace les anciens joueurs par la nouvelle liste
                team.players = playerMap[countryName].map(name => ({
                    id: uid(), 
                    name: name
                }));
            } else {
                console.warn(`Pays "${countryName}" non trouvé dans tes équipes. Vérifie l'orthographe.`);
            }
        }
    });
    alert("Import des joueurs terminé !");
}

                                <div><strong>Coach :</strong> ${t.coach || 'Non renseigné'}</div>
                                <div style="margin-top:10px;"><strong>Joueurs :</strong></div>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 1.1em; color: #fff; margin-top: 5px;">
                                    ${t.players.map(p => `<span>${p.name}</span>`).join('')}
                                </div>
                            </div>
                            <div class="row" style="margin-top: 15px;">
                                <button onclick="editPlayers('${t.id}')">Gérer joueurs</button>
                                <button class="bad" onclick="if(confirm('Supprimer ${t.country} ?')) setState(s=>s.teams=s.teams.filter(x=>x.id!=='${t.id}'))">Supprimer</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('')}
    </div>`;
}
function updateTimers() {
    // 1. Mise à jour des timers dans l'écran Live
    window.state.matches.forEach(m => {
        if (m.status === 'live') {
            const el = document.querySelector(`[data-match-id="${m.id}"]`);
            if (el) el.textContent = elapsed(m);
        }
    });
}

function generatePaperVersion() {
    // Vérification de sécurité pour les fonctions globales
    if (typeof window.team !== 'function' || typeof window.cat !== 'function') {
        console.error("Erreur : window.team ou window.cat non défini. Vérifie que ces fonctions sont attachées à l'objet window.");
        return;
    }

    var win = window.open('', '_blank');
    if (!win) { alert("Pop-up bloqué"); return; }
    
    var style = `
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; color: #333; }
        h1 { text-align: center; color: #2c3e50; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; }
        h2 { color: #2c3e50; margin-top: 30px; border-left: 5px solid #2c3e50; padding-left: 10px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th { background-color: #2c3e50; color: white; padding: 10px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #ddd; }
        .score-cell { font-weight: bold; text-align: center; font-size: 1.1em; }
        .page-break { page-break-after: always; }
        .player-list { font-size: 0.9em; }
    </style>`;

    var content = "<html><head>" + style + "</head><body>";

    // --- 1. MATCHS ---
    var sortedMatches = [...window.state.matches].sort((a, b) => 
        (a.day || 1) - (b.day || 1) || window.timeToMin(a.plannedTime) - window.timeToMin(b.plannedTime)
    );
    
    var groupedMatches = {};
    sortedMatches.filter(function(m) { return m.phase === 'GROUP'; }).forEach(function(m) {
        if (!groupedMatches[m.cat]) groupedMatches[m.cat] = [];
        groupedMatches[m.cat].push(m);
    });

    for (var catId in groupedMatches) {
        var catName = window.cat(catId) ? window.cat(catId).name : "Catégorie " + catId;
        content += "<h1>" + catName + " - Matchs</h1>";
        content += "<table><thead><tr><th>Jour</th><th>Heure</th><th>Poule</th><th>Match</th><th>Score</th></tr></thead><tbody>";
        
        groupedMatches[catId].forEach(function(m) {
            var tA = window.team(m.a) ? window.team(m.a).country : "A";
            var tB = window.team(m.b) ? window.team(m.b).country : "B";
            var pouleNom = m.pool || "-";
            var sA = (m.sa !== undefined) ? m.sa : "0";
            var sB = (m.sb !== undefined) ? m.sb : "0";
            var scoreFinal = (m.status === 'done') ? (sA + " - " + sB) : "-";
            
            content += "<tr><td>" + (m.day || "-") + "</td><td>" + (m.plannedTime || "--:--") + "</td><td>" + pouleNom + "</td><td><strong>" + tA + "</strong> vs <strong>" + tB + "</strong></td><td class='score-cell'>" + scoreFinal + "</td></tr>";
        });
        content += "</tbody></table><div class='page-break'></div>";
    }

    // --- 2. JOUEURS PAR ÉQUIPE ---
    content += "<h1>Liste des Joueurs par Équipe</h1>";
    window.state.cats.forEach(function(cat) {
        content += "<h2>Catégorie : " + cat.name + "</h2>";
        ['A', 'B'].forEach(function(pool) {
            var teamsInPool = window.state.teams.filter(function(t) { return t.cat === cat.id && t.pool === pool; });
            if (teamsInPool.length > 0) {
                content += "<h3>Poule " + pool + "</h3>";
                content += "<table><thead><tr><th>Pays</th><th>Joueurs</th></tr></thead><tbody>";
                teamsInPool.forEach(function(t) {
                    var playerList = t.players ? t.players.map(function(p) { return p.name; }).join(', ') : "Aucun joueur";
                    content += "<tr><td><strong>" + t.country + "</strong></td><td class='player-list'>" + playerList + "</td></tr>";
                });
                content += "</tbody></table>";
            }
        });
    });
    
    content += "</html>";
    win.document.open();
    win.document.write(content);
    win.document.close();
    setTimeout(function() { win.print(); }, 500);
}
function exportJSON() {
    // Convertit l'état actuel en texte
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
    const downloadAnchorNode = document.createElement('a');
    
    // Nomme le fichier avec la date du jour pour s'y retrouver
    const fileName = "Sauvegarde_Nazario_" + new Date().toISOString().slice(0, 10) + ".json";
    
    downloadAnchorNode.setAttribute("href", dataStr);
    downloadAnchorNode.setAttribute("download", fileName);
    document.body.appendChild(downloadAnchorNode);
    downloadAnchorNode.click(); // Simule le clic pour télécharger
    downloadAnchorNode.remove(); // Nettoie après le téléchargement
}

function importJSON(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const importedState = JSON.parse(e.target.result);
            // Vérification simple pour éviter d'importer n'importe quel fichier
            if (importedState && importedState.cats && importedState.teams) {
                if (confirm("Attention : Cela va écraser toutes les données actuelles par celles du fichier. Continuer ?")) {
                    state = importedState;
                    save(); // Enregistre dans localStorage
                    render(); // Rafraîchit l'affichage
                    alert("Importation réussie !");
                }
            } else {
                alert("Erreur : Le fichier JSON ne semble pas être une sauvegarde de tournoi valide.");
            }
        } catch (err) {
            alert("Erreur lors de la lecture du fichier : " + err.message);
        }
    };
    reader.readAsText(file);
}

window.resetTournament = function() {
    if (confirm('ATTENTION : Tout supprimer ? Cette action réinitialisera tout et recréera les catégories par défaut.')) {
        
        // 1. Utilise la fonction seed() pour recréer l'état initial (avec les 3 catégories)
        window.state = seed(); 
        
        // 2. Vider le localStorage pour éviter les conflits avec d'anciennes données
        ['nazario_v11', 'nazario_v10'].forEach(k => localStorage.removeItem(k));
        
        // 3. Sauvegarder cet état tout neuf sur Firebase
        if (typeof window.save === 'function') {
            window.save(); 
        }

        // 4. Recharger la page pour repartir sur une base saine
        location.reload();
    }
};
function bracketView(cid) {
    const matches = window.state.matches.filter(m => m.cat === cid);
    const catIdx = window.state.cats.findIndex(c => c.id === cid);
    const isCat3 = (catIdx === 2); // Ta catégorie 3 spécifique

    // Configuration des colonnes : Barrages pour Cat3, Quarts pour les autres
    const cols = [
        { phase: isCat3 ? 'BARRAGE' : 'QF', title: isCat3 ? 'BARRAGES' : 'QUARTS' },
        { phase: 'SF', title: 'DEMIS' },
        { phase: 'F', title: 'FINALE' }
    ];

    const renderMatchSlot = (m) => {
        if (!m) return `<div class="bracket-slot" style="height: 90px; margin: 8px 0; border: 1px dashed rgba(255,255,255,0.1); border-radius: 8px;"></div>`;
        
        const a = team(m.a), b = team(m.b);
        const isDone = m.status === 'done';
        const aWins = isDone && (m.winner === m.a || parseInt(m.sa) > parseInt(m.sb));
        const bWins = isDone && (m.winner === m.b || parseInt(m.sb) > parseInt(m.sa));
        
        // Logique Score : affiché seulement si le match a commencé
        const showScore = (m.status !== 'todo');
        const saDisplay = showScore ? m.sa : '—';
        const sbDisplay = showScore ? m.sb : '—';

        return `
        <div class="bracket-slot" style="background: rgba(0,0,0,0.4); border: 1px solid #333; border-radius: 8px; padding: 10px; margin: 8px 0; height: 90px; display: flex; flex-direction: column; justify-content: space-between;">
            <!-- Team A -->
            <div style="display: flex; justify-content: space-between; align-items: center; opacity: ${isDone && !aWins ? '0.4' : '1'}">
                <div style="display: flex; align-items: center; gap: 8px; overflow: hidden;">
                    ${flagHTML(a)}<span style="font-size: 0.85rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${a.country || '...'}</span>
                </div>
                <span style="color: var(--gold); font-weight: 900; font-size: 1.2rem;">${saDisplay}</span>
            </div>
            <!-- Team B -->
            <div style="display: flex; justify-content: space-between; align-items: center; opacity: ${isDone && !bWins ? '0.4' : '1'}">
                <div style="display: flex; align-items: center; gap: 8px; overflow: hidden;">
                    ${flagHTML(b)}<span style="font-size: 0.85rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${b.country || '...'}</span>
                </div>
                <span style="color: var(--gold); font-weight: 900; font-size: 1.2rem;">${sbDisplay}</span>
            </div>
        </div>`;
    };

    return `
    <div class="bracket-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 10px;">
        ${cols.map(col => `
            <div class="bracket-col">
                <div class="bracket-header" style="text-align: center; color: var(--gold); font-weight: bold; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px;">
                    ${col.title}
                </div>
                <div class="bracket-content">
                    ${matches
                        .filter(m => m.phase === col.phase)
                        .sort((a,b) => a.order - b.order)
                        .map(m => renderMatchSlot(m))
                        .join('') || '<div style="text-align:center; color:#555; margin-top:20px;">-</div>'}
                </div>
            </div>
        `).join('')}
    </div>`;
}

function getPoolCount(cid) {
    const teams = window.catTeams(cid);
    // On récupère toutes les poules uniques (A, B, etc.)
    const pools = [...new Set(teams.map(t => t.pool).filter(p => p))];
    return pools.length;
}
function tvBracket() {
    const catColors = ['var(--u13-color)', 'var(--u15-color)', 'var(--u18-color)'];
    return `
    <main class="tv-screen">
        <div class="grid">
            ${state.cats.map((c, i) => `
                <div class="card tv-card" style="--cat-color: ${catColors[i % catColors.length]}">
                    <div class="pitch-head">
                        <span>${c.name}</span>
                    </div>
                    ${bracketView(c.id)}
                </div>
            `).join('')}
        </div>
    </main>`;
}
// 3. ÉCOUTEUR "TEMPS RÉEL" (C'est lui qui remplace onSnapshot)
    onValue(window.stateRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            window.state = data;
            render();
        } else {
            window.state = seed();
            window.save();
        }
    });

setInterval(() => {

    const clockEl = document.getElementById('clock-time');

        clockEl.textContent = now.toLocaleTimeString('fr-FR', {

        });

    // 3. LOGIQUE DE ROTATION TV AUTOMATIQUE
   // ... dans ton setInterval ...

	if (window.state && window.state.tv && window.state.tv.auto) {
		window.tvTick++;
		const interval = window.state.tv.seconds || 10;
		
		if (window.tvTick >= interval) {

			window.tvIndex = (window.tvIndex + 1) % window.TVSCREENS.length;

}, 1000);
