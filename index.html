</style></head><body><div id="root"></div><script>
const WC=[['Argentina','ARG','🇦🇷'],['Australia','AUS','🇦🇺'],['Austria','AUT','🇦🇹'],['Belgique','BEL','🇧🇪'],['Bosnie-Herzégovine','BIH','🇧🇦'],['Brésil','BRA','🇧🇷'],['Canada','CAN','🇨🇦'],['Cap-Vert','CPV','🇨🇻'],['Colombie','COL','🇨🇴'],['Croatie','CRO','🇭🇷'],['Curaçao','CUW','🇨🇼'],['Tchéquie','CZE','🇨🇿'],['RD Congo','COD','🇨🇩'],['Équateur','ECU','🇪🇨'],['Égypte','EGY','🇪🇬'],['Angleterre','ENG','🏴'],['France','FRA','🇫🇷'],['Allemagne','GER','🇩🇪'],['Ghana','GHA','🇬🇭'],['Haïti','HAI','🇭🇹'],['Iran','IRN','🇮🇷'],['Irak','IRQ','🇮🇶'],['Côte d’Ivoire','CIV','🇨🇮'],['Japon','JPN','🇯🇵'],['Jordanie','JOR','🇯🇴'],['Mexique','MEX','🇲🇽'],['Maroc','MAR','🇲🇦'],['Pays-Bas','NED','🇳🇱'],['Nouvelle-Zélande','NZL','🇳🇿'],['Norvège','NOR','🇳🇴'],['Panama','PAN','🇵🇦'],['Paraguay','PAR','🇵🇾'],['Portugal','POR','🇵🇹'],['Qatar','QAT','🇶🇦'],['Arabie saoudite','KSA','🇸🇦'],['Écosse','SCO','🏴󠁧󠁢󠁳󠁣󠁴󠁿'],['Sénégal','SEN','🇸🇳'],['Afrique du Sud','RSA','🇿🇦'],['Corée du Sud','KOR','🇰🇷'],['Espagne','ESP','🇪🇸'],['Suède','SWE','🇸🇪'],['Suisse','SUI','🇨🇭'],['Tunisie','TUN','🇹🇳'],['Turquie','TUR','🇹🇷'],['États-Unis','USA','🇺🇸'],['Uruguay','URU','🇺🇾'],['Ouzbékistan','UZB','🇺🇿'],['Algérie','DZA','🇩🇿']].map(([name,code,flag])=>({name,code,flag}));
const ISO2={ARG:'ar',AUS:'au',AUT:'at',BEL:'be',BIH:'ba',BRA:'br',CAN:'ca',CPV:'cv',COL:'co',CRO:'hr',CUW:'cw',CZE:'cz',COD:'cd',ECU:'ec',EGY:'eg',ENG:'gb-eng',FRA:'fr',GER:'de',GHA:'gh',HAI:'ht',IRN:'ir',IRQ:'iq',CIV:'ci',JPN:'jp',JOR:'jo',MEX:'mx',MAR:'ma',NED:'nl',NZL:'nz',NOR:'no',PAN:'pa',PAR:'py',POR:'pt',QAT:'qa',KSA:'sa',SCO:'gb-sct',SEN:'sn',RSA:'za',KOR:'kr',ESP:'es',SWE:'se',SUI:'ch',TUN:'tn',TUR:'tr',USA:'us',URU:'uy',UZB:'uz',DZA:'dz'};
function flagHTML(x,label=''){let code=(typeof x==='string'?x:x?.code)||'';return `<img class="flag-img" src="assets/flags/${code}.png" alt="${label||code}"><span class="pill small" style="display:none">${code}</span>`}
const uid=()=>Math.random().toString(36).slice(2,9);let state=load()||seed();state.tv=state.tv||{auto:true,seconds:10};state.finals=state.finals||{};state.cats.forEach(c=>{c.outboundMinutes=Number(c.outboundMinutes||c.groupMinutes)||10;c.returnMinutes=Number(c.returnMinutes)||7;c.finalMinutes=Number(c.finalMinutes)||12});state.schedule=state.schedule||{start:'10:00',slot:20,pauseStart:'12:30',pauseMinutes:90};state.matches.forEach(m=>{m.phase=m.phase||'GROUP';if(m.remainingMs==null)m.remainingMs=null;if(m.lastStartedAt==null)m.lastStartedAt=m.startedAt||null});let tab=new URLSearchParams(location.search).has('tv')?'tv':'admin',tvIndex=0,modal=null;
function seed(){const cats=['U13','U15','Seniors'].map((name,i)=>({id:uid(),name,outboundMinutes:10+i*2,returnMinutes:7+i,finalMinutes:12+i*2}));let teams=[];cats.forEach((c,ci)=>WC.slice(ci*8,ci*8+8).forEach((p,i)=>teams.push({id:uid(),cat:c.id,pool:i%2?'B':'A',country:p.name,code:p.code,flag:p.flag,players:Array.from({length:10},(_,j)=>({id:uid(),name:`Joueur ${j+1} ${p.code}`}))})));return{title:'Nazario Ulis Cup',cats,teams,matches:[],goals:[],finals:{},tv:{auto:true,seconds:10},schedule:{start:'10:00',slot:20,pauseStart:'12:30',pauseMinutes:90}}}
const channel=('BroadcastChannel'in window)?new BroadcastChannel('nazario_v12_sync'):null;function save(){localStorage.setItem('nazario_v12',JSON.stringify(state));channel?.postMessage(state)}function load(){try{return JSON.parse(localStorage.getItem('nazario_v12'))||JSON.parse(localStorage.getItem('nazario_v10'))||JSON.parse(localStorage.getItem('nazario_v9'))||JSON.parse(localStorage.getItem('nazario_v7'))}catch{return null}}function setState(fn){fn(state);save();render()}function catTeams(cid){return state.teams.filter(t=>t.cat===cid)}function team(id){return state.teams.find(t=>t.id===id)||{country:'?',flag:'🏳️',players:[]}}function cat(id){return state.cats.find(c=>c.id===id)||{name:'?',outboundMinutes:10,returnMinutes:7,finalMinutes:12}}function fmt(ms){let s=Math.max(0,Math.ceil(ms/1000)),m=Math.floor(s/60);s%=60;return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}function matchDurationMs(m){let c=cat(m.cat);return 60000*(m.phase==='GROUP'?(m.leg==='RETURN'?c.returnMinutes:c.outboundMinutes):c.finalMinutes)}function remainingValue(m){let base=m.remainingMs==null?matchDurationMs(m):m.remainingMs;if(m.status==='live'&&m.lastStartedAt)base-=Date.now()-m.lastStartedAt;return Math.max(0,base)}function elapsed(m){return fmt(remainingValue(m))}function timerEnded(m){return remainingValue(m)<=0}
function timeToMin(t){let [h,m]=String(t||'00:00').split(':').map(Number);return h*60+m}
function minToTime(v){v=((v%1440)+1440)%1440;return String(Math.floor(v/60)).padStart(2,'0')+':'+String(v%60).padStart(2,'0')}
function applySchedule(matches){
  const start=timeToMin(state.schedule.start), pause=timeToMin(state.schedule.pauseStart), pauseEnd=pause+Number(state.schedule.pauseMinutes||0), slot=Number(state.schedule.slot||20);
  state.cats.forEach(c=>{
    const list=matches.filter(m=>m.cat===c.id).sort((a,b)=>a.order-b.order);
    let cur=start;
    list.forEach(m=>{if(cur>=pause&&cur<pauseEnd)cur=pauseEnd;m.plannedTime=minToTime(cur);cur+=slot});
  });
}
function roundRobin(arr){let a=[...arr];if(a.length%2)a.push(null);let rounds=[];for(let r=0;r<a.length-1;r++){let games=[];for(let i=0;i<a.length/2;i++){let x=a[i],y=a[a.length-1-i];if(x&&y)games.push(r%2?[y,x]:[x,y])}rounds.push(games);a.splice(1,0,a.pop())}return rounds}
function genMatches(){setState(s=>{s.matches=[];s.cats.forEach(c=>{let pools={A:catTeams(c.id).filter(t=>t.pool==='A'),B:catTeams(c.id).filter(t=>t.pool==='B')};let rounds={A:roundRobin(pools.A),B:roundRobin(pools.B)};let ordered=[];let max=Math.max(rounds.A.length,rounds.B.length);for(let r=0;r<max;r++){let ga=rounds.A[r]||[],gb=rounds.B[r]||[];let n=Math.max(ga.length,gb.length);for(let i=0;i<n;i++){if(ga[i])ordered.push(['A',ga[i]]);if(gb[i])ordered.push(['B',gb[i]])}}for(const leg of ['OUTBOUND','RETURN']){for(const [pool,pair] of ordered){let [a,b]=leg==='RETURN'?[pair[1],pair[0]]:pair;s.matches.push({id:uid(),cat:c.id,pool,leg,phase:'GROUP',order:0,a:a.id,b:b.id,sa:0,sb:0,status:'todo',startedAt:null,endedAt:null,remainingMs:null})}}});s.matches.forEach((m,i)=>m.order=i+1);applySchedule(s.matches)})}
function standings(cid,pool){let rows=catTeams(cid).filter(t=>!pool||t.pool===pool).map(t=>({team:t,j:0,g:0,n:0,p:0,bp:0,bc:0,diff:0,pts:0}));let map=Object.fromEntries(rows.map(r=>[r.team.id,r]));state.matches.filter(m=>m.cat===cid&&m.phase==='GROUP'&&m.status==='done'&&(!pool||m.pool===pool)).forEach(m=>{let a=map[m.a],b=map[m.b];if(!a||!b)return;a.j++;b.j++;a.bp+=m.sa;a.bc+=m.sb;b.bp+=m.sb;b.bc+=m.sa;if(m.sa>m.sb){a.g++;b.p++;a.pts+=3}else if(m.sa<m.sb){b.g++;a.p++;b.pts+=3}else{a.n++;b.n++;a.pts++;b.pts++}});rows.forEach(r=>r.diff=r.bp-r.bc);return rows.sort((a,b)=>b.pts-a.pts||b.diff-a.diff||b.bp-a.bp)}
function scorers(cid){let map={};state.goals.filter(g=>g.cat===cid).forEach(g=>{let k=g.player+'|'+g.team;map[k]??={player:g.player,team:team(g.team),goals:0};map[k].goals++});return Object.values(map).sort((a,b)=>b.goals-a.goals)}
function categoryIndex(cid){let i=state.cats.findIndex(c=>c.id===cid);return i<0?999:i}
function sortedMatches(){return [...state.matches].sort((a,b)=>{let ta=timeToMin(a.plannedTime||'23:59'),tb=timeToMin(b.plannedTime||'23:59');return ta-tb||categoryIndex(a.cat)-categoryIndex(b.cat)||(a.order||0)-(b.order||0)})}
function startSlot(plannedTime){setState(s=>{let now=Date.now();let byCat=new Set();s.matches.filter(m=>m.plannedTime===plannedTime&&m.status==='todo').sort((a,b)=>categoryIndex(a.cat)-categoryIndex(b.cat)||(a.order||0)-(b.order||0)).forEach(m=>{if(byCat.has(m.cat))return;byCat.add(m.cat);m.remainingMs=m.remainingMs==null?matchDurationMs(m):Math.max(0,m.remainingMs);m.status='live';m.startedAt=m.startedAt||now;m.lastStartedAt=now;m.endedAt=null})})}
function startMatch(id){setState(s=>{let m=s.matches.find(x=>x.id===id);if(!m)return;let now=Date.now();m.remainingMs=m.remainingMs==null?matchDurationMs(m):Math.max(0,m.remainingMs);m.status='live';m.startedAt=m.startedAt||now;m.lastStartedAt=now;m.endedAt=null})}function pauseMatch(id){setState(s=>{let m=s.matches.find(x=>x.id===id);if(!m||m.status!=='live')return;m.remainingMs=remainingValue(m);m.lastStartedAt=null;m.status='paused'})}function resumeMatch(id){setState(s=>{let m=s.matches.find(x=>x.id===id);if(!m||m.status!=='paused')return;m.lastStartedAt=Date.now();m.status='live'})}function finishMatch(id){let m=state.matches.find(x=>x.id===id);if(m.phase!=='GROUP'&&m.sa===m.sb){alert('Un match à élimination directe ne peut pas finir sur un score nul.');return}modal={type:'scorers',match:id,a:Array.from({length:m.sa},()=>''),b:Array.from({length:m.sb},()=>'')};render()}function confirmScorers(){setState(s=>{let m=s.matches.find(x=>x.id===modal.match);m.remainingMs=remainingValue(m);m.lastStartedAt=null;m.status='done';m.endedAt=Date.now();s.goals=s.goals.filter(g=>g.match!==m.id);modal.a.filter(Boolean).forEach(p=>s.goals.push({match:m.id,cat:m.cat,team:m.a,player:p}));modal.b.filter(Boolean).forEach(p=>s.goals.push({match:m.id,cat:m.cat,team:m.b,player:p}));modal=null})}

function finalRoundLabel(p){return p==='R16'?'Huitièmes':p==='QF'?'Quarts':p==='SF'?'Demi-finales':p==='F'?'Finale':p}
function generateFinals(cid){
 let A=standings(cid,'A'),B=standings(cid,'B');
 if(A.length!==B.length||![4,8].includes(A.length)){alert('Il faut deux poules de même taille, avec 4 ou 8 équipes.');return}
 let phase=A.length===4?'QF':'R16';
 setState(s=>{
  s.matches=s.matches.filter(m=>!(m.cat===cid&&m.phase!=='GROUP'));
  let base=Math.max(0,...s.matches.map(m=>m.order));
  for(let i=0;i<A.length;i++) s.matches.push({id:uid(),cat:cid,pool:'Finale',phase,order:base+i+1,a:A[i].team.id,b:B[A.length-1-i].team.id,sa:0,sb:0,status:'todo',startedAt:null,endedAt:null});
  s.finals[cid]={started:true};
 })
}
function generateNextFinalRound(cid){
 let phases=['R16','QF','SF','F'];let existing=phases.filter(p=>state.matches.some(m=>m.cat===cid&&m.phase===p));let current=existing.at(-1);if(!current){generateFinals(cid);return}
 let games=state.matches.filter(m=>m.cat===cid&&m.phase===current);
 if(games.some(m=>m.status!=='done')){alert('Tous les matchs de ce tour doivent être terminés.');return}
 if(current==='F'){alert('La finale est déjà terminée.');return}
 let winners=games.sort((a,b)=>a.order-b.order).map(m=>m.sa>m.sb?m.a:m.b);
 let next={R16:'QF',QF:'SF',SF:'F'}[current];
 setState(s=>{let base=Math.max(0,...s.matches.map(m=>m.order));for(let i=0;i<winners.length;i+=2)s.matches.push({id:uid(),cat:cid,pool:'Finale',phase:next,order:base+i/2+1,a:winners[i],b:winners[i+1],sa:0,sb:0,status:'todo',startedAt:null,endedAt:null})})
}
function finalsView(){return `<div class="grid">${state.cats.map(c=>{let fm=state.matches.filter(m=>m.cat===c.id&&m.phase!=='GROUP');let phases=['R16','QF','SF','F'].filter(p=>fm.some(m=>m.phase===p));return `<div class="card"><div class="top"><h2>${c.name} — phases finales</h2><div class="actions"><button class="good" onclick="generateFinals('${c.id}')">Générer le tableau croisé</button>${phases.length?`<button onclick="generateNextFinalRound('${c.id}')">Tour suivant</button>`:''}</div></div>${phases.map(p=>`<h3>${finalRoundLabel(p)}</h3>${fm.filter(m=>m.phase===p).map(m=>{let a=team(m.a),b=team(m.b);return `<div class="tv-row"><div class="meta">${finalRoundLabel(p)}</div><div class="matchup"><div class="teamline">${flagHTML(a,a.country)} ${a.country}</div><div class="score">${m.sa} - ${m.sb}</div><div class="teamline" style="justify-content:flex-end">${b.country} ${flagHTML(b,b.country)}</div></div><div class="meta">${m.status==='done'?'Terminé':(m.status==='live'||m.status==='paused')?elapsed(m):'À jouer'}</div></div>`}).join('')}`).join('')||'<p class="muted">Termine les poules puis génère les phases finales. Poules de 4 : quarts croisés. Poules de 8 : huitièmes croisés.</p>'}</div>`}).join('')}</div>`}
function tableStand(rows){return `<table class="table"><colgroup><col style="width:38px"><col style="width:48px"><col><col style="width:42px"><col style="width:42px"><col style="width:42px"><col style="width:42px"><col style="width:48px"><col style="width:48px"><col style="width:56px"><col style="width:55px"></colgroup><thead><tr><th>#</th><th>🏳</th><th>Équipe</th><th class="num">J</th><th class="num">G</th><th class="num">N</th><th class="num">P</th><th class="num">BP</th><th class="num">BC</th><th class="num">Diff</th><th class="num">Pts</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td class="center">${i+1}</td><td class="center">${flagHTML(r.team,r.team.country)}</td><td>${r.team.country}</td><td class="num">${r.j}</td><td class="num">${r.g}</td><td class="num">${r.n}</td><td class="num">${r.p}</td><td class="num">${r.bp}</td><td class="num">${r.bc}</td><td class="num">${r.diff>0?'+':''}${r.diff}</td><td class="num"><b>${r.pts}</b></td></tr>`).join('')}</tbody></table>`}
function teamOpt(selected='',cid=''){let list=cid?catTeams(cid).map(t=>({name:t.country,code:t.code,flag:t.flag,id:t.id})):WC.map(p=>({...p,id:p.code}));return list.map(t=>`<option value="${t.id}" ${selected==t.id?'selected':''}>${t.flag} ${t.name||t.country}</option>`).join('')}
function admin(){return `<div class="grid2"><div class="card"><h2>Paramètres</h2><label>Titre<input value="${state.title}" onchange="setState(s=>s.title=this.value)"></label><h3>Catégories</h3>${state.cats.map(c=>`<div class="row"><input value="${c.name}" onchange="setState(s=>s.cats.find(x=>x.id==='${c.id}').name=this.value)"><button class="bad" onclick="setState(s=>s.cats=s.cats.filter(x=>x.id!=='${c.id}'))">Supprimer</button></div>`).join('')}<button onclick="setState(s=>s.cats.push({id:uid(),name:'Nouvelle catégorie'}))">Ajouter catégorie</button><div class="actions"><button class="good" onclick="genMatches()">Générer les matchs A/B</button><button onclick="['nazario_v12','nazario_v10','nazario_v9','nazario_v7'].forEach(k=>localStorage.removeItem(k));location.reload()">Réinitialiser</button></div></div><div class="card"><h2>Créer une équipe / pays</h2><div class="row"><select id="newCat">${state.cats.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select><select id="newPool"><option>A</option><option>B</option></select></div><input id="countrySearch" placeholder="Rechercher un pays (ex: Algérie, France...)" oninput="render()"><select id="newCountry">${WC.filter(p=>(document.getElementById('countrySearch')?.value||'').toLowerCase().split(' ').every(q=>(p.name+p.code).toLowerCase().includes(q))).map(p=>`<option value="${p.code}">${p.flag} ${p.name}</option>`).join('')}</select><button class="good" onclick="addTeam()">Ajouter équipe</button><p class="muted small">Liste basée sur les 48 pays de la phase finale Coupe du Monde 2026.</p></div></div><div class="card"><h2>Durées par catégorie</h2><p class="muted">Durées distinctes pour l’aller, le retour et les phases finales.</p>${state.cats.map(c=>`<div class="schedule-grid"><strong>${c.name}</strong><label>Aller (min)<input type="number" min="1" value="${c.outboundMinutes}" onchange="setState(s=>s.cats.find(x=>x.id==='${c.id}').outboundMinutes=Math.max(1,+this.value))"></label><label>Retour (min)<input type="number" min="1" value="${c.returnMinutes}" onchange="setState(s=>s.cats.find(x=>x.id==='${c.id}').returnMinutes=Math.max(1,+this.value))"></label><label>Finales (min)<input type="number" min="1" value="${c.finalMinutes}" onchange="setState(s=>s.cats.find(x=>x.id==='${c.id}').finalMinutes=Math.max(1,+this.value))"></label></div>`).join('')}</div><div class="card"><h2>Planning automatique</h2><div class="schedule-grid"><label>Début<input type="time" value="${state.schedule.start}" onchange="setState(s=>s.schedule.start=this.value)"></label><label>Créneau (min)<input type="number" min="1" value="${state.schedule.slot}" onchange="setState(s=>s.schedule.slot=+this.value)"></label><label>Début pause<input type="time" value="${state.schedule.pauseStart}" onchange="setState(s=>s.schedule.pauseStart=this.value)"></label><label>Pause (min)<input type="number" min="0" value="${state.schedule.pauseMinutes}" onchange="setState(s=>s.schedule.pauseMinutes=+this.value)"></label></div><div class="actions"><button onclick="setState(s=>applySchedule(s.matches))">Recalculer les horaires</button></div></div><div class="card"><h2>Équipes</h2>${state.cats.map(c=>`<h3>${c.name}</h3><div class="grid2">${catTeams(c.id).map(t=>`<div class="match"><div class="teamline">${flagHTML(t,t.country)}${t.country} <span class="pill">Poule ${t.pool}</span></div><div class="row"><select onchange="setState(s=>s.teams.find(x=>x.id==='${t.id}').pool=this.value)"><option ${t.pool==='A'?'selected':''}>A</option><option ${t.pool==='B'?'selected':''}>B</option></select><button onclick="editPlayers('${t.id}')">Joueurs</button><button class="bad" onclick="setState(s=>s.teams=s.teams.filter(x=>x.id!=='${t.id}'))">Suppr.</button></div></div>`).join('')}</div>`).join('')}</div>`}
function addTeam(){let p=WC.find(x=>x.code==document.getElementById('newCountry').value);setState(s=>s.teams.push({id:uid(),cat:document.getElementById('newCat').value,pool:document.getElementById('newPool').value,country:p.name,code:p.code,flag:p.flag,players:Array.from({length:10},(_,j)=>({id:uid(),name:`Joueur ${j+1} ${p.code}`}))}))}
function editPlayers(tid){let t=team(tid);modal={type:'players',team:tid,text:t.players.map(p=>p.name).join('\n')};render()}
function matchesView(){let rows=sortedMatches(),html='',lastTime=null;for(const m of rows){let t=m.plannedTime||'--:--';if(t!==lastTime){let slot=rows.filter(x=>(x.plannedTime||'--:--')===t),ready=slot.filter(x=>x.status==='todo'),cats=new Set(ready.map(x=>x.cat)).size;html+=`<tr class="slot-admin-header"><td colspan="7"><div class="slot-admin-line"><div><span class="slot-admin-time">CRÉNEAU ${t}</span> <span class="slot-admin-count">${slot.length} match(s) • jusqu’à ${cats} terrain(s) disponibles</span></div>${ready.length?`<button class="good" onclick="startSlot('${t}')">▶ Démarrer le créneau (${cats} match${cats>1?'s':''})</button>`:'<span class="muted">Créneau déjà lancé ou terminé</span>'}</div></td></tr>`;lastTime=t}html+=matchRow(m)}return `<div class="card compact-card"><div class="top"><div><h2>Gestion des matchs</h2><span class="muted">Tri par horaire • les trois catégories peuvent démarrer en parallèle</span></div></div><div class="table-wrap"><table class="match-table"><colgroup><col style="width:64px"><col style="width:95px"><col style="width:105px"><col><col style="width:94px"><col style="width:110px"><col style="width:245px"></colgroup><thead><tr><th>Heure</th><th>Catégorie</th><th>Phase</th><th>Rencontre</th><th>Compte à rebours</th><th>État</th><th>Actions</th></tr></thead><tbody>${html||'<tr><td colspan="7" class="muted">Aucun match généré.</td></tr>'}</tbody></table></div></div>`}

function matchRow(m){let a=team(m.a),b=team(m.b);let st=m.status==='live'?'En cours':m.status==='paused'?'En pause':m.status==='done'?'Terminé':'À jouer';return `<tr class="match-data-row"><td><b>${m.plannedTime||'--:--'}</b><div class="muted small">#${m.order}</div></td><td>${cat(m.cat).name}</td><td><span class="pill">${m.phase==='GROUP'?((m.leg==='RETURN'?'Retour':'Aller')+' • Poule '+m.pool):finalRoundLabel(m.phase)}</span></td><td><div class="matchup"><div class="side">${flagHTML(a,a.country)}<span>${a.country}</span></div><div class="scorebox"><input type="number" min="0" value="${m.sa}" onchange="setState(s=>s.matches.find(x=>x.id==='${m.id}').sa=Math.max(0,+this.value))"><span>–</span><input type="number" min="0" value="${m.sb}" onchange="setState(s=>s.matches.find(x=>x.id==='${m.id}').sb=Math.max(0,+this.value))"></div><div class="side away"><span>${b.country}</span>${flagHTML(b,b.country)}</div></div></td><td><b class="countdown-admin">${elapsed(m)}</b></td><td><span class="status-dot ${m.status}">${st}</span></td><td><div class="row-actions">${m.status==='todo'?`<button class="good" onclick="startMatch('${m.id}')">▶ Démarrer</button>`:''}${m.status==='live'?`<button class="pause" onclick="pauseMatch('${m.id}')">Ⅱ Pause</button><button class="good" onclick="finishMatch('${m.id}')">✓ Fin du match</button>`:''}${m.status==='paused'?`<button class="good" onclick="resumeMatch('${m.id}')">▶ Reprendre</button><button class="good" onclick="finishMatch('${m.id}')">✓ Fin du match</button>`:''}${m.status==='done'?`<button onclick="finishMatch('${m.id}')">Buteurs</button>`:''}<button class="bad" onclick="setState(s=>s.matches=s.matches.filter(x=>x.id!=='${m.id}'))">Suppr.</button></div></td></tr>`}
function standingsView(){return `<div class="grid">${state.cats.map(c=>`<div class="card"><h2>${c.name}</h2><h3>Poule A</h3>${tableStand(standings(c.id,'A'))}<h3>Poule B</h3>${tableStand(standings(c.id,'B'))}</div>`).join('')}</div>`}
function scorersView(){return `<div class="grid">${state.cats.map(c=>`<div class="card"><h2>Buteurs ${c.name}</h2><table class="table"><colgroup><col style="width:40px"><col style="width:50px"><col><col><col style="width:70px"></colgroup><thead><tr><th>#</th><th>🏳</th><th>Joueur</th><th>Équipe</th><th class="num">Buts</th></tr></thead><tbody>${scorers(c.id).map((r,i)=>`<tr><td>${i+1}</td><td class="center">${flagHTML(r.team,r.team.country)}</td><td>${r.player}</td><td>${r.team.country}</td><td class="num"><b>${r.goals}</b></td></tr>`).join('')||'<tr><td colspan="5" class="muted">Aucun buteur.</td></tr>'}</tbody></table></div>`).join('')}</div>`}
function tvHeader(){let now=new Date();return `<header class="broadcast-header"><div class="broadcast-brand"><img src="assets/logo-nazario.png" alt="Logo Nazario Ulis Cup"><div><div class="broadcast-title">NAZARIO <span>ULIS CUP</span></div><div class="edition">★ ÉDITION 7 ★</div></div></div><div class="broadcast-time"><strong>${now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</strong><span>${now.toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}).toUpperCase()}</span></div><div class="broadcast-welcome"><strong>BIENVENUE AU TOURNOI</strong><span>RESPECT • FAIR-PLAY • SOLIDARITÉ</span></div><div class="broadcast-mode"><b>MODE TV</b><span class="live">DIFFUSION EN COURS</span><div class="mode-actions"><button class="${state.tv.auto?'good':''}" onclick="setState(s=>s.tv.auto=!s.tv.auto)">AUTO ${state.tv.auto?'ON':'OFF'}</button><select onchange="setState(s=>s.tv.seconds=+this.value)">${[5,10,15,20,30].map(x=>`<option value="${x}" ${state.tv.seconds===x?'selected':''}>${x}s</option>`).join('')}</select><button onclick="tvIndex=(tvIndex+4)%5;render()">◀</button><button onclick="tvIndex=(tvIndex+1)%5;render()">▶</button></div></div></header>`}
function tv(){let screens=[tvLive,tvProgram,tvStand,tvScorers,tvPartners];return `<div class="tv-v12">${tvHeader()}${screens[tvIndex%5]()}</div>`}
function nextMatchForCat(cid,currentId){return state.matches.filter(m=>m.cat===cid&&m.status==='todo'&&m.id!==currentId).sort((a,b)=>timeToMin(a.plannedTime)-timeToMin(b.plannedTime)||a.order-b.order)[0]||null}
function tvLive(){let live=state.matches.filter(m=>m.status==='live'||m.status==='paused');return `<main class="tv-screen live-screen-v1202"><h1 class="tv-screen-title">ÉCRAN 1 : MATCHS EN COURS <span class="live-dot">● EN DIRECT</span></h1><div class="live-columns-v12">${state.cats.slice(0,3).map((c,i)=>{let m=live.find(x=>x.cat===c.id);return m?matchTV12(m,i):emptyPitch12(c,i)}).join('')}</div><div class="pause-banner-v12">🍴 PAUSE REPAS ${state.schedule.pauseStart} - ${minToTime(timeToMin(state.schedule.pauseStart)+Number(state.schedule.pauseMinutes||0))}</div></main>`}
function emptyPitch12(c,i){return `<section class="pitch-v12 ${['blue','green','red'][i]}"><div class="pitch-head-v12"><span>TERRAIN ${i+1}</span><small>${c.name}</small></div><div style="display:flex;align-items:center;justify-content:center;font-family:Impact;font-size:42px;color:#9aa9ba">TERRAIN LIBRE</div><div></div><div class="next-v12"><div class="label">PROCHAIN MATCH</div><div class="row"><div class="team">À venir</div><time>--:--</time><div class="team"></div></div></div></section>`}
function matchTV12(m,i=0){let a=team(m.a),b=team(m.b),n=nextMatchForCat(m.cat,m.id),next='';if(n){let na=team(n.a),nb=team(n.b);next=`<div class="next-v12"><div class="label">PROCHAIN MATCH</div><div class="row"><div class="team">${flagHTML(na,na.country)}<span>${na.country}</span></div><time>${n.plannedTime||'--:--'}</time><div class="team"><span>${nb.country}</span>${flagHTML(nb,nb.country)}</div></div></div>`}else next=`<div class="next-v12"><div class="label">PROCHAIN MATCH</div><div class="row"><div class="team">Aucun</div><time>—</time><div class="team"></div></div></div>`;return `<section class="pitch-v12 ${['blue','green','red'][i%3]}"><div class="pitch-head-v12"><span>TERRAIN ${i+1}</span><small>${cat(m.cat).name} • ${m.phase==='GROUP'?((m.leg==='RETURN'?'RETOUR':'ALLER')+' • POULE '+m.pool):finalRoundLabel(m.phase).toUpperCase()}</small></div><div class="duel-v12"><div class="side-v12">${flagHTML(a,a.country)}<strong>${a.country}</strong></div><div class="score-v12">${m.sa}<em>–</em>${m.sb}</div><div class="side-v12">${flagHTML(b,b.country)}<strong>${b.country}</strong></div></div><div class="countdown-v12"><span>TEMPS RESTANT</span><strong>${elapsed(m)}</strong></div>${next}</section>`}
function tvProgram(){return `<main class="tv-screen"><h1 class="tv-screen-title">ÉCRAN 2 : PROGRAMME DES MATCHS <span class="live-dot">● EN DIRECT</span></h1><div class="program-grid-v12">${state.cats.slice(0,3).map((c,i)=>{let ms=state.matches.filter(m=>m.cat===c.id).sort((a,b)=>timeToMin(a.plannedTime)-timeToMin(b.plannedTime)||a.order-b.order).slice(0,8);return `<section class="tv-board-v12 ${['blue','green','red'][i]}"><h2>TERRAIN ${i+1}</h2><p>${c.name}</p><table class="tv-data"><thead><tr><th style="width:58px">Heure</th><th>Équipe 1</th><th style="width:28px">VS</th><th>Équipe 2</th><th style="width:55px">Score</th><th style="width:70px">Statut</th></tr></thead><tbody>${ms.map(m=>{let a=team(m.a),b=team(m.b);let st=m.status==='done'?'Terminé':(m.status==='live'||m.status==='paused')?'En cours':'À venir';return `<tr class="${m.status==='done'?'done-row':(m.status==='live'||m.status==='paused')?'live-row':''}"><td>${m.plannedTime||'--:--'}</td><td><span class="teamcell">${flagHTML(a,a.country)}${a.country}</span></td><td>VS</td><td><span class="teamcell">${flagHTML(b,b.country)}${b.country}</span></td><td>${m.status==='todo'?'—':m.sa+'-'+m.sb}</td><td>${st}</td></tr>`}).join('')}</tbody></table></section>`}).join('')}</div><div class="pause-banner-v12">🍴 PAUSE REPAS ${state.schedule.pauseStart} - ${minToTime(timeToMin(state.schedule.pauseStart)+Number(state.schedule.pauseMinutes||0))}</div></main>`}
function tableStand12(rows){return `<table class="tv-data"><thead><tr><th style="width:26px">#</th><th>Équipe</th><th>MJ</th><th>V</th><th>N</th><th>D</th><th>BP</th><th>BC</th><th>Diff</th><th>Pts</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td>${i+1}</td><td><span class="teamcell">${flagHTML(r.t,r.t.country)}${r.t.country}</span></td><td>${r.j}</td><td>${r.g}</td><td>${r.n}</td><td>${r.p}</td><td>${r.bp}</td><td>${r.bc}</td><td>${r.diff>0?'+':''}${r.diff}</td><td><b>${r.pts}</b></td></tr>`).join('')}</tbody></table>`}
function tvStand(){return `<main class="tv-screen"><h1 class="tv-screen-title">ÉCRAN 3 : CLASSEMENTS DES CATÉGORIES <span class="live-dot">● EN DIRECT</span></h1><div class="stand-grid-v12">${state.cats.slice(0,3).map((c,i)=>{let pools=[...new Set(state.teams.filter(t=>t.cat===c.id).map(t=>t.pool))].sort();return `<section class="tv-board-v12 ${['blue','green','red'][i]}"><h2>${c.name}</h2><p>• ${pools.length} POULE${pools.length>1?'S':''}</p>${pools.map(pool=>`<div class="pool-block-v12"><h3>POULE ${pool}</h3>${tableStand12(standings(c.id,pool))}</div>`).join('')}</section>`}).join('')}</div><div class="pause-banner-v12">🍴 PAUSE REPAS ${state.schedule.pauseStart} - ${minToTime(timeToMin(state.schedule.pauseStart)+Number(state.schedule.pauseMinutes||0))}</div></main>`}
function tvScorers(){return `<main class="tv-screen"><h1 class="tv-screen-title">ÉCRAN 4 : CLASSEMENT DES BUTEURS <span class="live-dot">● EN DIRECT</span></h1><div class="scorer-grid-v12">${state.cats.slice(0,3).map((c,i)=>`<section class="tv-board-v12 ${['blue','green','red'][i]}"><h2>${c.name}</h2><p>TOP 10 DES BUTEURS</p><table class="tv-data"><thead><tr><th style="width:36px">#</th><th>Joueur</th><th>Équipe</th><th style="width:55px">Buts</th></tr></thead><tbody>${scorers(c.id).slice(0,10).map((r,n)=>`<tr><td>${n+1}</td><td>${r.player}</td><td><span class="teamcell">${flagHTML(r.team,r.team.country)}${r.team.country}</span></td><td><b>${r.goals}</b></td></tr>`).join('')||'<tr><td colspan="4">Aucun buteur enregistré</td></tr>'}</tbody></table></section>`).join('')}</div><div class="pause-banner-v12">🍴 PAUSE REPAS ${state.schedule.pauseStart} - ${minToTime(timeToMin(state.schedule.pauseStart)+Number(state.schedule.pauseMinutes||0))}</div></main>`}
function tvPartners(){return `<main class="tv-screen"><div class="partners-slide-v12"><img src="assets/partners-v12.png" alt="Partenaires officiels Nazario Ulis Cup"></div></main>`}
function renderModal(){if(!modal)return'';if(modal.type==='players'){let t=team(modal.team);return `<div class="modal"><div class="modalbox"><h2>Joueurs ${flagHTML(t,t.country)} ${t.country}</h2><textarea rows="14" onchange="modal.text=this.value">${modal.text}</textarea><div class="actions"><button class="good" onclick="setState(s=>{let t=s.teams.find(x=>x.id===modal.team);t.players=modal.text.split('\\n').filter(Boolean).map(name=>({id:uid(),name}));modal=null})">Enregistrer</button><button onclick="modal=null;render()">Annuler</button></div></div></div>`}if(modal.type==='scorers'){let m=state.matches.find(x=>x.id===modal.match),a=team(m.a),b=team(m.b);let opts=t=>t.players.map(p=>`<option value="${p.name}">${p.name}</option>`).join('');return `<div class="modal"><div class="modalbox"><h2>Choix des buteurs</h2><p>${flagHTML(a,a.country)} ${a.country} ${m.sa} - ${m.sb} ${flagHTML(b,b.country)} ${b.country}</p><div class="grid2"><div><h3>${flagHTML(a,a.country)} ${a.country}</h3>${modal.a.map((v,i)=>`<label>But ${i+1}<select onchange="modal.a[${i}]=this.value"><option value="">Choisir...</option>${a.players.map(p=>`<option value="${p.name}" ${v===p.name?'selected':''}>${p.name}</option>`).join('')}</select></label>`).join('')||'<p class="muted">Aucun but</p>'}</div><div><h3>${flagHTML(b,b.country)} ${b.country}</h3>${modal.b.map((v,i)=>`<label>But ${i+1}<select onchange="modal.b[${i}]=this.value"><option value="">Choisir...</option>${b.players.map(p=>`<option value="${p.name}" ${v===p.name?'selected':''}>${p.name}</option>`).join('')}</select></label>`).join('')||'<p class="muted">Aucun but</p>'}</div></div><div class="actions"><button class="good" onclick="confirmScorers()">Enregistrer les buteurs</button><button onclick="modal=null;render()">Annuler</button></div></div></div>`}return''}
function render(){let root=document.getElementById('root');let content=tab==='admin'?admin():tab==='matches'?matchesView():tab==='standings'?standingsView():tab==='finals'?finalsView():tab==='scorers'?scorersView():tv();root.innerHTML=`<div class="app ${tab==='tv'?'hidden':''}"><div class="top"><div class="brand"><h1>${state.title}</h1><span class="muted">V12.1 • écran TV 1 reconstruit • maquette figée</span></div><div class="tabs">${[['admin','Admin'],['matches','Matchs'],['standings','Classements'],['finals','Phases finales'],['scorers','Buteurs'],['tv','Mode TV']].map(x=>`<button class="tab ${tab===x[0]?'active':''}" onclick="tab='${x[0]}';render()">${x[1]}</button>`).join('')}</div></div>${content}</div>${tab==='tv'?content:''}${renderModal()}`}
channel&&(channel.onmessage=e=>{state=e.data;render()});addEventListener('storage',e=>{if(e.key==='nazario_v12'&&e.newValue){state=JSON.parse(e.newValue);render()}});let tvTick=0;setInterval(()=>{if(tab==='tv'&&state.tv.auto){tvTick++;if(tvTick>=state.tv.seconds){tvTick=0;tvIndex++;render()}}},1000);setInterval(()=>{if(state.matches.some(m=>m.status==='live'))render()},1000);render();
</script></body></html>
